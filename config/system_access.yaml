system_access:
  enabled: true
  read:
    enabled: true
    allowed_paths:
    - /home/alex/projects/sity
    - /home/alex/projects
    - /home/alex
    allowed_services:
    - ssh
    - sity-backend
    - sity-frontend
    - minecraft
    - nginx
    - sity-test
  safe_actions:
    enabled: true
    require_confirmation: true
    allowed_services:
    - sity-backend
    - sity-frontend
    - sity-test
file_access:
  readable_paths:
    - /home/alex/projects/sity
    - /home/alex/projects/sity/backend
    - /home/alex/projects/sity/frontend
    - /home/alex/projects/sity/config
    - /home/alex/projects/sity/scripts
    - /home/alex/projects/sity/deploy
    - /home/alex/projects/sity/README.md
  blocked_paths:
    - /home/alex/projects/sity/.env
    - /home/alex/projects/sity/frontend/.env.local
    - /home/alex/.ssh
    - /home/alex/.config
    - /etc
    - /boot
    - /root
    - /var/lib
    - /var/log
git_access:
  enabled: true
  read:
    enabled: true
    default_repository: /home/alex/projects/sity
    repository_aliases:
      sity: /home/alex/projects/sity
    allowed_repositories:
    - /home/alex/projects/sity
