system_access:
  enabled: true
  read:
    enabled: true
    allowed_paths:
    - .
    - ..
    - ../..
    allowed_services:
    - ssh
    - sity-backend
    - sity-frontend
    - minecraft
    - nginx
    - sity-test
    - sity-mobile
  safe_actions:
    enabled: true
    require_confirmation: true
    allowed_services:
    - sity-backend
    - sity-frontend
    - sity-test
    - sity-mobile
file_access:
  readable_paths:
  - .
  - work/canal
  writable_paths:
  - backend
  - frontend
  - config
  - scripts
  - deploy
  - README.md
  - work
  - work/canal/guiones
  - work/canal/audio
  - work/canal/assets
  blocked_paths:
  - .git
  - .env
  - .env.local
  - backend/.env
  - backend/.env.local
  - frontend/.env
  - frontend/.env.local
  - data
  - captures
  - backend/.venv
  - frontend/node_modules
  - /home/alex/.ssh
  - /home/alex/.config
  - /etc
  - /boot
  - /root
  - /var/lib
  - /var/log
git_access:
  enabled: true
  read:
    enabled: true
    default_repository: .
    repository_aliases:
      sity: .
    allowed_repositories:
    - .
