system_access:
  enabled: true
  read:
    enabled: true
    allowed_paths:
    - .       # project root (resolved from SITY_PROJECT_ROOT at runtime)
    - ..      # parent directory
    - ../..   # grandparent directory
    allowed_services:
    - ssh
    - sity-backend
    - sity-frontend
    - minecraft
    - nginx
    - sity-test
  safe_actions:
    enabled: true
    require_confirmation: true
    allowed_services:
    - sity-backend
    - sity-frontend
    - sity-test
file_access:
  readable_paths:
    - .
  writable_paths:
    - backend
    - frontend
    - config
    - scripts
    - deploy
    - README.md
  blocked_paths:
    - .git
    - .env
    - .env.local
    - backend/.env
    - backend/.env.local
    - frontend/.env
    - frontend/.env.local
    - data
    - captures
    - backend/.venv
    - frontend/node_modules
    - /home/alex/.ssh
    - /home/alex/.config
    - /etc
    - /boot
    - /root
    - /var/lib
    - /var/log
git_access:
  enabled: true
  read:
    enabled: true
    default_repository: .   # resolved from SITY_PROJECT_ROOT at runtime
    repository_aliases:
      sity: .               # alias → project root
    allowed_repositories:
    - .                     # project root (resolved from SITY_PROJECT_ROOT at runtime)
