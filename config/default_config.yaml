project:
  name: Sity
  version: 0.1.0

personality:
  sarcasm_level: 0.70
  rudeness_level: 0.45
  warmth_level: 0.35
  honesty_level: 0.90
  initiative_level: 0.60
  dry_humor_level: 0.35
  frialdad_afectiva_level: 0.75
  contrarian_level: 0.45
  patience_level: 0.50
  refusal_chance: 0.15
  helpfulness_level: 0.80
  verbosity_level: 0.45
  melancholy_level: 0.20
  skepticism_level: 0.20

privacy:
  store_images: false
  store_audio: false
  store_transcripts: ask
  memory_enabled: true
  cloud_ai_enabled: true

senses:
  pc_vision:
    enabled: true
    image_ttl_seconds: 300
    request_timeout_ms: 5000
    max_captures_per_minute: 12
    max_image_long_side_px: 1280
    jpeg_quality: 80

ai:
  primary_provider: claude
  fallback_provider: null
  fallback_enabled: false
  request_timeout_ms: 60000
  max_retries: 1
  max_output_tokens_short: 220
  max_tool_loop_iterations: 3
  planner_max_tokens: 500
  after_tools_min_tokens: 700
  history_limit_file_path: 2
  claude:
    model: claude-haiku-4-5-20251001
    strong_model: claude-sonnet-4-6
    model_router_enabled: true
    max_tokens: 4000

usage:
  daily_token_budget: 1000000
  monthly_token_budget: 1000000
  warning_threshold: 0.80
  critical_threshold: 0.95
  warn_once_per_period: true
  auto_enable_saver_mode_at_warning: false
  auto_enable_saver_mode_at_critical: true

tokens:
  max_recent_turns: 4
  max_relevant_memories: 5
  max_input_tokens_interactive: 3000

debug:
  enabled: true
  log_level: INFO
  debug_logs_ttl_days: 7
  audit_logs_ttl_days: 60

storage:
  tmp_dir: runtime/tmp
  data_dir: data
  export_dir: data/exports
  tts_voice_speaker: female

web_search:
  ddg_url: "https://html.duckduckgo.com/html/"
  request_timeout_s: 15
  max_results: 5
  cache_ttl_short_s: 3600
  cache_ttl_long_s: 86400
  cache_max_entries: 500

audio:
  stt_model: small
  stt_device: cpu
  stt_language: es
  tts_voice: es_ES-sharvard-medium
  tts_voice_speaker: female
  tts_long_response_chars: 500
  persist_tts: true
  cleanup_days: 7


home_assistant:
  url: "http://192.168.0.118:8123"
  known_devices:
    - entity_id: "switch.tapo_p100"
      name: "enchufe dormitorio"
      type: "switch"
      location: "dormitorio"
    - entity_id: "light.luz_cuarto"
      name: "bombilla cuarto"
      type: "light"
      location: "cuarto"
      color_modes: ["rgb_color", "color_temp_kelvin"]
      color_temp_range: [2700, 6500]
    - entity_id: "light.cuarto_malaga"
      name: "bombilla cuarto Málaga"
      type: "light"
      location: "cuarto Málaga"
      color_modes: ["rgb_color", "color_temp_kelvin"]
      color_temp_range: [2700, 6500]
      note: "unavailable cuando no está en la red local"
