# Sity LoRA v0 — Config de referencia (Axolotl)
# Copiar a sity_gemma3_lora_v0.yaml y adaptar rutas antes de usar.
# No usar este archivo directamente: es un ejemplo, no una config válida.
#
# Documentación: https://github.com/axolotl-ai-cloud/axolotl

base_model: google/gemma-3-4b-it
# Alternativa si Unsloth tiene soporte nativo:
# base_model: unsloth/gemma-3-4b-it-bnb-4bit

model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer

# QLoRA 4-bit — cabe en 8GB VRAM
load_in_4bit: true
strict: false

# Dataset — rutas relativas al proyecto
datasets:
  - path: datasets/sity_style_v0/train_style_v0.jsonl
    type: chat_template
    chat_template: chatml  # ajustar según tokenizer de gemma-3
    # Para Gemma 3 puede ser necesario: gemma o llama3 según versión de Axolotl

val_set_path: datasets/sity_style_v0/eval_style_v0.jsonl

# Directorio de salida (ignorado por .gitignore)
output_dir: training/output/sity-gemma3-lora-v0

# Longitud máxima de secuencia
sequence_len: 512
sample_packing: false

# LoRA
adapter: lora
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - v_proj
  # Descomentar si se quiere mayor capacidad (más VRAM):
  # - k_proj
  # - o_proj
  # - gate_proj
  # - up_proj
  # - down_proj

# Entrenamiento
num_epochs: 2          # v0 es smoke test — 1-3 epochs máximo
micro_batch_size: 2
gradient_accumulation_steps: 8  # effective batch = 16
learning_rate: 2.0e-4
lr_scheduler: cosine
warmup_ratio: 0.05
optimizer: paged_adamw_8bit

# Evaluación y checkpoints
eval_steps: 25
save_steps: 25
save_total_limit: 3
logging_steps: 5
eval_table_size: 5

# Precisión
bf16: auto
fp16: false
tf32: false

# Gradient checkpointing ahorra VRAM a costa de velocidad
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

# Flash attention si disponible (requiere flash-attn instalado)
flash_attention: false  # cambiar a true si flash-attn está instalado

# Seed para reproducibilidad
seed: 42

# Wandb — desactivado por defecto
wandb_project:
wandb_run_id:
