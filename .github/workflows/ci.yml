name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-local:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: backend
      SITY_AI_PROVIDER: mock
      SITY_PROJECT_ROOT: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Compile backend
        run: python -m compileall -q backend/app

      - name: Run pytest local tests
        run: pytest -q tests

      - name: Type check (mypy)
        run: |
          cd backend
          python -m mypy app/ --ignore-missing-imports

  integration-mock:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: backend
      SITY_AI_PROVIDER: mock
      SITY_DAILY_TOKEN_HARD_CAP: "false"
      SITY_PROJECT_ROOT: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc -b

      - name: Build
        run: npm run build
